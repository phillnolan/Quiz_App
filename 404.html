<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Quiz App</title>
    <script type="text/javascript">
      ;(function (location) {
        var pathSegmentsToKeep = 1

        location.replace(
          location.protocol +
            '//' +
            location.hostname +
            (location.port ? ':' + location.port : '') +
            location.pathname
              .split('/')
              .slice(0, 1 + pathSegmentsToKeep)
              .join('/') +
            '/?/' +
            location.pathname
              .slice(1)
              .split('/')
              .slice(pathSegmentsToKeep)
              .join('/')
              .replace(/&/g, '~and~') +
            (location.search
              ? '&' + location.search.slice(1).replace(/&/g, '~and~')
              : '') +
            location.hash,
        )
      })(window.location)
    </script>
  </head>
  <body></body>
</html>
